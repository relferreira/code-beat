name: Code Beat
description: Review pull requests with OpenRouter, leave code comments, and score code quality from 0 to 5.
author: relferreira
inputs:
  openrouter-api-key:
    description: OpenRouter API key used to call the configured model.
    required: true
  model:
    description: OpenRouter model name, for example anthropic/claude-sonnet-4 or openai/gpt-4.1.
    required: false
    default: deepseek/deepseek-v4-flash
  models:
    description: Optional list of OpenRouter model names shared by both review and code-quality agents. Accepts newline, comma, or JSON-array syntax.
    required: false
    default: ""
  review-models:
    description: Optional list of OpenRouter model names for review agents. Overrides models for the review flow.
    required: false
    default: ""
  code-quality-models:
    description: Optional list of OpenRouter model names for code-quality agents. Overrides models for the code-quality flow.
    required: false
    default: ""
  review-runs:
    description: Number of independent thermo-nuclear PR review agents to run.
    required: false
    default: "2"
  code-quality-runs:
    description: Number of independent thermo-nuclear code-quality review agents to run.
    required: false
    default: "2"
  github-token:
    description: GitHub token used to read pull request diffs and create review comments.
    required: false
    default: ${{ github.token }}
  max-comments:
    description: Maximum number of inline review comments to create.
    required: false
    default: "12"
  fail-on-score-below:
    description: Optional numeric threshold. The action fails when the score is below this value.
    required: false
    default: ""
runs:
  using: node24
  main: dist/index.js
branding:
  icon: activity
  color: red
