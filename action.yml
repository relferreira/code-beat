name: Code Beat
description: Review pull requests with OpenRouter, leave code comments, and score code quality from 0 to 5.
author: relferreira
inputs:
  openrouter-api-key:
    description: OpenRouter API key used to call the configured model.
    required: true
  model:
    description: OpenRouter model name, for example anthropic/claude-sonnet-4 or openai/gpt-4.1.
    required: true
  github-token:
    description: GitHub token used to read pull request diffs and create review comments.
    required: false
    default: ${{ github.token }}
  max-comments:
    description: Maximum number of inline review comments to create.
    required: false
    default: "12"
  fail-on-score-below:
    description: Optional numeric threshold. The action fails when the score is below this value.
    required: false
    default: ""
runs:
  using: node20
  main: dist/index.js
branding:
  icon: activity
  color: red
